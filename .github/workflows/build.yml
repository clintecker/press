# Reusable build for any book repository. A book's entire workflow is:
#
#   jobs:
#     book:
#       uses: clintecker/press/.github/workflows/build.yml@v1
#
# The version tag pins the pipeline, the pandoc defaults, the design, and
# the toolchain image together. The press action reference below must
# match this file's own release tag; scripts/release.sh keeps them in
# step and the release-contract workflow proves it on every tag.
#
# Privilege is per job: building a book executes book content, so the
# build job holds read permissions only; the release job alone can
# write, and only on tags.

name: Build book

on:
  workflow_call: {}

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read
    container:
      image: ghcr.io/clintecker/press-toolchain:sha-202165d97623f02f1920e243952e886a423b7b95
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.github_token }}
    outputs:
      slug: ${{ steps.book.outputs.slug }}
      title: ${{ steps.book.outputs.title }}
      site_url: ${{ steps.book.outputs.site_url }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Build and verify
        uses: clintecker/press@v1.15.1
        env:
          # Tag builds are releases; releases refuse vacuous witnesses.
          PRESS_RELEASE: ${{ startsWith(github.ref, 'refs/tags/v') && '1' || '' }}
      - name: Read book identity
        id: book
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          # The slug law and normalization live in the press; this step
          # asks the installed press instead of keeping a second copy.
          from press import booklib
          book = booklib.book()
          print(f"slug={book.slug}")
          print(f"title={' '.join(book.title.split())}")
          print(f"site_url={' '.join(book.site_url.split())}")
          PY
      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ steps.book.outputs.slug }}
          path: |
            dist/*
            !dist/site
            !dist/pages
          if-no-files-found: error
      - name: Upload pages artifact
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && github.event_name == 'push'
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: dist/pages

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ needs.build.outputs.slug }}
          path: dist
      - name: Release
        env:
          GH_TOKEN: ${{ github.token }}
          TITLE: ${{ needs.build.outputs.title }}
          SITE_URL: ${{ needs.build.outputs.site_url }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          default_branch="${{ github.event.repository.default_branch }}"
          git fetch origin "$default_branch" --quiet
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/$default_branch"; then
            echo "refusing to release a commit that is not on $default_branch"
            exit 1
          fi
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" {p=1; next}
            p && /^## \[/ {exit}
            p {print}
          ' CHANGELOG.md > release-notes.md
          if ! test -s release-notes.md; then
            echo "no CHANGELOG section for $version; roll [Unreleased] before tagging"
            exit 1
          fi
          if [ -n "$SITE_URL" ]; then
            {
              echo ""
              echo "## Public downloads"
              echo ""
              echo "Direct links (no login required):"
              echo ""
              for f in dist/*.pdf dist/*.epub dist/*.html dist/*.md dist/*.txt dist/*.docx dist/*.zip; do
                name=$(basename "$f")
                echo "- [$name](${SITE_URL%/}/downloads/$name)"
              done
            } >> release-notes.md
          fi
          gh release create "$GITHUB_REF_NAME" \
            $(find dist -maxdepth 1 -type f | sort) \
            --title "$TITLE $GITHUB_REF_NAME" \
            --notes-file release-notes.md

  deploy-pages:
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
