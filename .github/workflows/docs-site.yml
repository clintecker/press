# The press publishes its own documentation as a site, built from the
# files the repo already maintains and link-checked before deploy.
# Every page derives from a source of record (REFERENCE.md is
# registry-generated and drift-checked), so the site cannot say
# something the repo does not.

name: Press site

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install pandoc
        run: sudo apt-get update -q && sudo apt-get install -y --no-install-recommends pandoc
      - name: Reconcile roadmap milestone metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/sync_roadmap.py --check
          python3 scripts/sync_roadmap.py --apply-github
      - run: python3 scripts/build_site.py
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: build/site

  deploy:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
