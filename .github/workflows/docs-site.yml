# The press publishes its own documentation as a site, built from the
# files the repo already maintains and link-checked before deploy.
# Every page derives from a source of record (REFERENCE.md is
# registry-generated and drift-checked), so the site cannot say
# something the repo does not.

name: Press site

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install pandoc
        run: sudo apt-get update -q && sudo apt-get install -y --no-install-recommends pandoc
      - name: Reconcile roadmap milestone metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/sync_roadmap.py --check
          python3 scripts/sync_roadmap.py --apply-github
      - run: python3 scripts/build_site.py
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: build/site

  deploy:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
