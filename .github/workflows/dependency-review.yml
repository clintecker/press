# Dependency review at the pull-request boundary (#154): before a change to
# a manifest or a pinned action can merge, this diffs the dependency set and
# fails on a known-vulnerable addition or a disallowed license. It reads the
# tree and comments once with the summary; it uploads nothing to a third
# party.
name: Dependency review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  review:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Check out
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
