name: Release contract

# A three-part tag promises that pipeline, action, and toolchain are
# one immutable unit. This check runs when the tag is pushed and turns
# red if the promise is false: the reusable workflow must reference
# THIS tag's action, and the toolchain image it names must be an
# immutable sha tag that actually exists.

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]

permissions:
  contents: read
  packages: read

jobs:
  contract:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Internal refs match the release being cut
        run: |
          tag="${GITHUB_REF_NAME}"
          grep -q "uses: clintecker/press@${tag}$" .github/workflows/build.yml \
            || { echo "build.yml does not pin the press action to ${tag}"; exit 1; }
          image=$(grep -o 'ghcr.io/clintecker/press-toolchain:sha-[0-9a-f]*' .github/workflows/build.yml | head -1)
          test -n "$image" \
            || { echo "build.yml does not pin an immutable toolchain sha tag"; exit 1; }
          echo "action pinned to ${tag}; toolchain pinned to ${image}"
      - name: Pinned toolchain image exists
        run: |
          image=$(grep -o 'ghcr.io/clintecker/press-toolchain:sha-[0-9a-f]*' .github/workflows/build.yml | head -1)
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker manifest inspect "$image" > /dev/null
          echo "toolchain manifest resolves: $image"
