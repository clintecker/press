name: Release contract

# A three-part tag promises that pipeline, action, and toolchain are
# one immutable unit. This check runs when the tag is pushed and turns
# red if the promise is false: the reusable workflow must reference
# THIS tag's action, and the toolchain image it names must be an
# immutable sha tag that actually exists.

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]

permissions:
  contents: read
  packages: read
  checks: read

jobs:
  contract:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Internal refs match the release being cut
        run: |
          tag="${GITHUB_REF_NAME}"
          grep -q "uses: clintecker/press@${tag}$" .github/workflows/build.yml \
            || { echo "build.yml does not pin the press action to ${tag}"; exit 1; }
          image=$(grep -o 'ghcr.io/clintecker/press-toolchain:sha-[0-9a-f]*' .github/workflows/build.yml | head -1)
          test -n "$image" \
            || { echo "build.yml does not pin an immutable toolchain sha tag"; exit 1; }
          echo "action pinned to ${tag}; toolchain pinned to ${image}"
      - name: Pinned toolchain image exists
        run: |
          image=$(grep -o 'ghcr.io/clintecker/press-toolchain:sha-[0-9a-f]*' .github/workflows/build.yml | head -1)
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker manifest inspect "$image" > /dev/null
          echo "toolchain manifest resolves: $image"
      - name: The integration gate is green on this commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # The release commit's own gate starts with the same push that
          # carries the tag; the contract waits for its verdict rather
          # than demanding prescience.
          for attempt in $(seq 1 50); do
            conclusion=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/check-runs" \
              --jq '[.check_runs[] | select(.name=="consumer")] | first | .conclusion // "pending"')
            case "$conclusion" in
              success) echo "integration gate green on the tagged commit"; break ;;
              failure|cancelled|timed_out) echo "gate is '$conclusion' on $GITHUB_SHA"; exit 1 ;;
              *) echo "waiting on the gate ($conclusion, attempt $attempt)"; sleep 30 ;;
            esac
            [ "$attempt" = 50 ] && { echo "gate never concluded for $GITHUB_SHA"; exit 1; }
          done
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: The release identity resolves to the proven objects
        run: |
          set -euo pipefail
          # A three-part tag is a clean checkout; *.egg-info is ignored, so
          # an editable install keeps the tree clean for the receipt.
          python3 -m pip install --quiet -e '.[dev]'
          python3 -m build --wheel --outdir /tmp/rc >/dev/null
          python3 - <<'PY'
          import glob, hashlib
          from press import receipts
          whl = glob.glob("/tmp/rc/*.whl")[0]
          digest = hashlib.sha256(open(whl, "rb").read()).hexdigest()
          # The collection layer stands for the CI proofs already green on
          # this commit; the release layer names the built wheel and the
          # pinned toolchain and extends it.
          collection = receipts.emit("collection", proofs=[],
                                     toolchain_digest=receipts.pinned_toolchain_digest())
          chain = [collection, receipts.build_release_receipt(digest, [collection])]
          open("/tmp/release-receipt.json", "w").write(receipts.to_json(chain))
          problems = receipts.verify_release(chain, digest)
          if problems:
              print("release identity does not hold:")
              for p in problems:
                  print(f"  - {p}")
              raise SystemExit(1)
          print("release identity proven: clean tree, package and toolchain "
                "match the pinned objects")
          PY
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-receipt
          path: /tmp/release-receipt.json
          if-no-files-found: error
