name: Press selftest

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: pip install -e '.[dev]'
      - name: Every format's linter, exactly as the pre-commit hook runs them
        run: pre-commit run --all-files --show-diff-on-failure
      - name: Site builds from these docs
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends pandoc
          python3 scripts/build_site.py
      - name: Clean distributions install and run from a fresh environment
        run: |
          set -euo pipefail
          # Build from the checked-out (clean) tree and treat any build
          # warning as a failure: a warning here is the undeclared-package
          # or bytecode-leak class the manifest rules exist to prevent.
          python3 -m build --sdist --wheel --outdir /tmp/dist-check 2>build.log
          if grep -i '^warning:' build.log; then
            echo "build emitted warnings; failing"; exit 1
          fi
          python3 -m twine check --strict /tmp/dist-check/*
          # No bytecode or cache may reach either artifact.
          python3 - <<'PY'
          import glob, tarfile, zipfile
          bad = []
          for whl in glob.glob("/tmp/dist-check/*.whl"):
              bad += [n for n in zipfile.ZipFile(whl).namelist()
                      if "__pycache__" in n or n.endswith((".pyc", ".pyo"))]
          for sdist in glob.glob("/tmp/dist-check/*.tar.gz"):
              bad += [n for n in tarfile.open(sdist).getnames()
                      if "__pycache__" in n or n.endswith((".pyc", ".pyo"))]
          assert not bad, f"distribution carries bytecode: {bad}"
          print("distributions are clean")
          PY
          # Install the built wheel into a throwaway venv and prove the
          # installed package runs its own selftest.
          python3 -m venv /tmp/fresh
          /tmp/fresh/bin/pip install --quiet /tmp/dist-check/*.whl
          /tmp/fresh/bin/press selftest

  selftest:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
        python: ["3.10", "3.11", "3.12", "3.13"]
        include:
          - os: macos-14
            python: "3.12"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python }}
      - run: pip install -e '.[dev]'
      - run: press selftest
      - name: Reusable invariant tests on this interpreter
        run: python3 -m pytest
      - name: Scaffold survives this interpreter
        run: |
          cd "$RUNNER_TEMP"
          press new matrix-proof --author "Matrix Proof"
          cd matrix-proof && press check
