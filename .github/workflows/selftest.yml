name: Press selftest

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: pip install -e '.[dev]'
      - name: Every format's linter, exactly as the pre-commit hook runs them
        run: pre-commit run --all-files --show-diff-on-failure
      - name: Changed policy code owes an invariant and a proof
        if: github.event_name == 'pull_request'
        run: |
          # Impact selection is for acceleration, not for skipping release
          # evidence: this only fails when changed policy code maps to no
          # classified surface or no invariant, and runs on PRs only.
          git fetch origin "${{ github.base_ref }}" --depth=1 || true
          python3 -m press.impact "origin/${{ github.base_ref }}"
      - name: No module's branch coverage regressed below its floor
        run: |
          # The ratchet hides the rendering toolchain internally and
          # measures the deterministic floor, so this gate cannot swing
          # with pandoc or LuaLaTeX being present; it goes red only on a
          # real per-module coverage regression.
          python3 scripts/coverage_ratchet.py
      - name: The pure-logic modules still kill their mutants
        run: |
          # Deterministic mutation over the pure-computation modules: a
          # surviving mutant beyond the baseline means a proof weakened.
          # Each mutant runs its example-based tests once, no retry.
          python3 scripts/mutation_ratchet.py
      - name: Site builds from these docs
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends pandoc
          python3 scripts/build_site.py
      - name: Clean distributions install and run from a fresh environment
        run: |
          set -euo pipefail
          # Build from the checked-out (clean) tree and treat any build
          # warning as a failure: a warning here is the undeclared-package
          # or bytecode-leak class the manifest rules exist to prevent.
          python3 -m build --sdist --wheel --outdir /tmp/dist-check 2>build.log
          if grep -i '^warning:' build.log; then
            echo "build emitted warnings; failing"; exit 1
          fi
          python3 -m twine check --strict /tmp/dist-check/*
          # No bytecode or cache may reach either artifact.
          python3 - <<'PY'
          import glob, tarfile, zipfile
          bad = []
          for whl in glob.glob("/tmp/dist-check/*.whl"):
              bad += [n for n in zipfile.ZipFile(whl).namelist()
                      if "__pycache__" in n or n.endswith((".pyc", ".pyo"))]
          for sdist in glob.glob("/tmp/dist-check/*.tar.gz"):
              bad += [n for n in tarfile.open(sdist).getnames()
                      if "__pycache__" in n or n.endswith((".pyc", ".pyo"))]
          assert not bad, f"distribution carries bytecode: {bad}"
          print("distributions are clean")
          PY
          # Install the built wheel into a throwaway venv and prove the
          # installed package runs its own selftest.
          python3 -m venv /tmp/fresh
          /tmp/fresh/bin/pip install --quiet /tmp/dist-check/*.whl
          /tmp/fresh/bin/press selftest
      - name: Emit this tier's trust receipt (#150)
        run: |
          # Reached only if every quality check above passed; the receipt
          # is the quality tier the release chain is assembled from.
          python3 -m press.receipts emit quality --out "${RUNNER_TEMP}/receipt-quality.json"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: receipt-quality
          path: ${{ runner.temp }}/receipt-quality.json
          if-no-files-found: error

  selftest:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
        python: ["3.10", "3.11", "3.12", "3.13"]
        include:
          - os: macos-14
            python: "3.12"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python }}
      - run: pip install -e '.[dev]'
      - run: press selftest
      - name: Reusable invariant tests on this interpreter
        run: python3 -m pytest
      - name: Scaffold survives this interpreter
        run: |
          cd "$RUNNER_TEMP"
          press new matrix-proof --author "Matrix Proof"
          cd matrix-proof && press check

  desk:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: A bare wheel refuses the desk cleanly, without Textual
        run: |
          set -euo pipefail
          python3 -m pip install --quiet build
          python3 -m build --wheel --outdir /tmp/dw
          python3 -m venv /tmp/bare
          /tmp/bare/bin/pip install --quiet /tmp/dw/*.whl
          # The desk must not import in a bare install; the entry says so
          # and exits 2, and the rest of the CLI is untouched.
          cd "$RUNNER_TEMP" && /tmp/bare/bin/press new bare-proof --author B
          cd bare-proof
          if /tmp/bare/bin/press desk; then echo "desk ran without tui extra"; exit 1; fi
          /tmp/bare/bin/press check
      - name: The tui wheel runs the operator desk end to end (headless)
        run: |
          set -euo pipefail
          python3 -m venv /tmp/tui
          # Install the built wheel with the tui extra plus the test tools,
          # then run the desk's headless proofs against the installed
          # package, not the checkout.
          /tmp/tui/bin/pip install --quiet "$(echo /tmp/dw/*.whl)[tui]" \
            pytest pytest-asyncio
          /tmp/tui/bin/python -m pytest tests/test_desk_app.py tests/test_desk_run.py \
            -p no:cacheprovider
