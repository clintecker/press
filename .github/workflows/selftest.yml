name: Press selftest

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  selftest:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
        python: ["3.10", "3.11", "3.12", "3.13"]
        include:
          - os: macos-14
            python: "3.12"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: pip install -e .
      - run: press selftest
      - name: Scaffold survives this interpreter
        run: |
          cd "$RUNNER_TEMP"
          press new matrix-proof --author "Matrix Proof"
          cd matrix-proof && press check
