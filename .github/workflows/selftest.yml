name: Press selftest

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: pip install -e '.[dev]'
      - name: Every format's linter, exactly as the pre-commit hook runs them
        run: pre-commit run --all-files --show-diff-on-failure
      - name: Site builds from these docs
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends pandoc
          python3 scripts/build_site.py
      - name: Distribution metadata is publishable
        run: |
          python3 -m build --sdist --wheel --outdir /tmp/dist-check
          python3 -m twine check --strict /tmp/dist-check/*

  selftest:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
        python: ["3.10", "3.11", "3.12", "3.13"]
        include:
          - os: macos-14
            python: "3.12"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python }}
      - run: pip install -e '.[dev]'
      - run: press selftest
      - name: Reusable invariant tests on this interpreter
        run: python3 -m pytest
      - name: Scaffold survives this interpreter
        run: |
          cd "$RUNNER_TEMP"
          press new matrix-proof --author "Matrix Proof"
          cd matrix-proof && press check
