name: Press selftest

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: pip install -e '.[dev]'
      - run: ruff check src/press
      - run: python3 -m mypy src/press
      - name: Roadmap matches its milestone registry
        run: python3 scripts/sync_roadmap.py --check
      - name: Site builds from these docs
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends pandoc
          python3 scripts/build_site.py

  selftest:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
        python: ["3.10", "3.11", "3.12", "3.13"]
        include:
          - os: macos-14
            python: "3.12"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python }}
      - run: pip install -e .
      - run: press selftest
      - name: Scaffold survives this interpreter
        run: |
          cd "$RUNNER_TEMP"
          press new matrix-proof --author "Matrix Proof"
          cd matrix-proof && press check
