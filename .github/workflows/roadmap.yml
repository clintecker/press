name: Roadmap integrity

on:
  pull_request:
  schedule:
    - cron: "17 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  projection:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - run: python3 scripts/sync_roadmap.py --check

  github-drift:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: projection
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      issues: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Detect out-of-band milestone metadata edits
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/sync_roadmap.py --check-github
