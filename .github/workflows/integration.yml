name: Press integration gate

# The consumer's proof: build the wheel (not an editable checkout),
# scaffold a stranger's book inside the supported toolchain, run the
# whole gauntlet, and then tamper with a public artifact to prove the
# verifier can refuse. Releases wait for this gate: tag only from a
# commit whose integration run is green.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: read

jobs:
  resolve:
    # The gate proves the image consumers actually receive: the sha
    # build.yml pins, not whatever :latest points at today.
    runs-on: ubuntu-24.04
    outputs:
      image: ${{ steps.pin.outputs.image }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - id: pin
        run: |
          image=$(grep -oE 'ghcr.io/clintecker/press-toolchain:sha-[0-9a-f]+@sha256:[0-9a-f]{64}' .github/workflows/build.yml | head -1)
          test -n "$image" || { echo "build.yml pins no toolchain @sha256 digest"; exit 1; }
          echo "image=$image" >> "$GITHUB_OUTPUT"

  consumer:
    needs: resolve
    runs-on: ubuntu-24.04
    container:
      image: ${{ needs.resolve.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.github_token }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Build and install the wheel
        run: |
          python3 -m pip install --break-system-packages --no-cache-dir build
          python3 -m build --wheel --outdir /tmp/wheels .
          python3 -m pip install --break-system-packages /tmp/wheels/press-*.whl
      - name: Wheel carries the package data
        run: |
          cd /tmp
          test "$(press skills | wc -l)" -ge 8
          press workflows | grep -q editorial-passes
          python3 -c "import press.aesthetic, pathlib; assert pathlib.Path(press.aesthetic.HOUSE).is_file()"
      - name: Scaffold a stranger's book
        run: |
          cd /tmp
          press new gate-proof --author "Gate Proof" --publisher "Gate Press" --place "Nowhere"
          cd gate-proof
          git init -q && git add -A
          python3 - <<'PY'
          import pathlib
          p = pathlib.Path("config/metadata.yaml")
          t = p.read_text().replace(
              "verify-sentinels: []",
              'verify-sentinels:\n  - "the gate remembers what it refused"',
          )
          p.write_text(t)
          c = pathlib.Path("book/chapters/00-preface.md")
          c.write_text(c.read_text() + "\n\nEvery build ends the same way: "
                       "the gate remembers what it refused.\n")
          PY
      - name: The whole gauntlet
        run: cd /tmp/gate-proof && press all
      - name: No original-book identity in public artifacts
        run: |
          cd /tmp/gate-proof
          ! grep -ri "mostly done\|mostly-done" dist/pages dist/site
      - name: Tampering turns the verifier red
        run: |
          cd /tmp/gate-proof
          rm dist/pages/downloads/gate-proof.pdf
          # The CLI target rebuilds before verifying (the anti-stale
          # law), which would resurrect the file; the crawler itself
          # must see the tampered site.
          if python3 -c "from press import verify_pages; raise SystemExit(verify_pages.main())" >/dev/null 2>&1; then
            echo "verifier blessed a tampered site" && exit 1
          fi
          echo "verifier refused the tampered site, as it must"
      - name: Emit this tier's trust receipt (#150)
        run: |
          # Reached only if the whole gauntlet passed; the integration tier
          # the release chain is assembled from. GITHUB_SHA is the commit.
          python3 -m press.receipts emit integration --out "${RUNNER_TEMP}/receipt-integration.json"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: receipt-integration
          path: ${{ runner.temp }}/receipt-integration.json
          if-no-files-found: error
