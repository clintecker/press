# Pull requests that touch the toolchain build the image and smoke it
# with read-only permissions and no registry credentials: PR jobs
# build contributor-controlled Dockerfile changes, so they hold no
# package-write surface at all. Main builds once, smokes that exact
# local image, and only then logs in and pushes the very same image
# object with docker push, never a second build, so the published
# digest is mechanically the digest that passed. The smoke itself
# lives in scripts/toolchain_smoke.sh, shared by both paths so they
# cannot drift.

name: Build toolchain image

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - .github/workflows/toolchain.yml
      - scripts/toolchain_smoke.sh
  pull_request:
    paths:
      - Dockerfile
      - .github/workflows/toolchain.yml
      - scripts/toolchain_smoke.sh
  workflow_dispatch:

concurrency:
  # Publishes serialize so :latest can never regress to an older build
  # finishing late.
  group: toolchain-image
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  smoke:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Build for smoke (no push, no credentials)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: false
          load: true
          tags: press-toolchain:candidate
      - name: Smoke the candidate
        run: scripts/toolchain_smoke.sh press-toolchain:candidate "$PWD"

  publish:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Build once
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: false
          load: true
          tags: press-toolchain:candidate
      - name: Smoke the exact image that will publish
        run: scripts/toolchain_smoke.sh press-toolchain:candidate "$PWD"
      - name: Log in to GHCR (after the smoke, never before)
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish the smoked image object
        run: |
          # docker push of the same local image, never a second build:
          # the pushed layers are byte-for-byte the layers that passed.
          smoked_id=$(docker image inspect -f '{{.Id}}' press-toolchain:candidate)
          docker tag press-toolchain:candidate ghcr.io/clintecker/press-toolchain:latest
          docker tag press-toolchain:candidate "ghcr.io/clintecker/press-toolchain:sha-$GITHUB_SHA"
          docker push ghcr.io/clintecker/press-toolchain:latest
          docker push "ghcr.io/clintecker/press-toolchain:sha-$GITHUB_SHA"
          published_id=$(docker image inspect -f '{{.Id}}' "ghcr.io/clintecker/press-toolchain:sha-$GITHUB_SHA")
          test "$smoked_id" = "$published_id" || { echo "published image is not the smoked image"; exit 1; }
          digest=$(docker image inspect -f '{{index .RepoDigests 0}}' "ghcr.io/clintecker/press-toolchain:sha-$GITHUB_SHA" || true)
          echo "smoked image id: $smoked_id"
          echo "published: $digest"
