name: Build toolchain image

# Pull requests that touch the toolchain build the image and smoke it
# without publishing; main builds, smokes the same build, and only
# then pushes. The smoke proves every promised binary actually
# executes inside the container (binfmt taught us that existence and
# executability are different facts) and that a minimal book builds
# and verifies with the press installed from this checkout.

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - .github/workflows/toolchain.yml
  pull_request:
    paths:
      - Dockerfile
      - .github/workflows/toolchain.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build for smoke (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: press-toolchain:smoke
      - name: Every promised tool executes
        run: |
          docker run --rm press-toolchain:smoke bash -euo pipefail -c '
            for tool in pandoc lualatex latexmk pdftoppm pdffonts pdfinfo pdftotext git make; do
              command -v "$tool" > /dev/null || { echo "missing: $tool"; exit 1; }
              "$tool" --version > /dev/null 2>&1 || "$tool" -v > /dev/null 2>&1 \
                || { echo "cannot execute: $tool"; exit 1; }
              echo "executes: $tool"
            done
            python3 -c "import PIL, yaml, pypdf; print(\"PIL\", PIL.__version__, \"pypdf\", pypdf.__version__)"
            fc-list : family > /tmp/fonts.txt
            grep -qi "Libertine" /tmp/fonts.txt && echo "Libertine faces present"
            test "$PRESS_TOOLCHAIN" = "1" && echo "PRESS_TOOLCHAIN promise set"
          '
      - name: epubcheck really runs
        run: |
          docker run --rm press-toolchain:smoke bash -euo pipefail -c '
            cd /tmp
            python3 - <<PY
          import zipfile
          with zipfile.ZipFile("broken.epub", "w") as z:
              z.writestr("mimetype", "application/epub+zip")
              z.writestr("META-INF/container.xml", "<container/>")
          PY
            if epubcheck broken.epub > out.txt 2>&1; then
              echo "epubcheck approved a broken epub" && exit 1
            fi
            grep -qi "error" out.txt && echo "epubcheck executes and rejects"
          '
      - name: A minimal book builds and verifies inside the image
        run: |
          docker run --rm -v "$PWD":/press press-toolchain:smoke bash -euo pipefail -c '
            python3 -m pip install --break-system-packages -q /press
            cd /tmp && press new smoke-proof --author "Smoke Proof"
            cd smoke-proof
            press pdf && press verify
            press epub && press verify-formats
          '
      - name: Publish (main only)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # :latest floats for development; the sha tag is immutable and
          # is what a release's build.yml pins, so a three-part press
          # tag resolves the same toolchain bytes forever. The push
          # reuses the smoked build's cache, so the published layers are
          # the layers that passed.
          tags: |
            ghcr.io/clintecker/press-toolchain:latest
            ghcr.io/clintecker/press-toolchain:sha-${{ github.sha }}
