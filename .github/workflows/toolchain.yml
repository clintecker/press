# The toolchain image is multi-arch: native amd64 (CI) and native arm64
# (Apple Silicon dev machines). Each architecture is built AND smoked on its
# own native runner -- never under emulation -- so the "smoke the exact bytes,
# then push that same object" invariant holds per architecture: the published
# per-arch digest is mechanically the digest that passed its native smoke.
# A final manifest job assembles :latest and :sha-<SHA> as a manifest list over
# the two smoked per-arch images, so `docker run` resolves the host's arch
# (arm64 on a Mac, amd64 in CI) with no qemu. Pull requests build and smoke
# both arches with no credentials and no push. The smoke lives in
# scripts/toolchain_smoke.sh, shared by both paths so they cannot drift.

name: Build toolchain image

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - .github/workflows/toolchain.yml
      - scripts/toolchain_smoke.sh
  pull_request:
    paths:
      - Dockerfile
      - .github/workflows/toolchain.yml
      - scripts/toolchain_smoke.sh
  workflow_dispatch:

concurrency:
  # Publishes serialize so :latest can never regress to an older build
  # finishing late.
  group: toolchain-image
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Build for smoke (native ${{ matrix.arch }}, no push, no credentials)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: false
          load: true
          tags: press-toolchain:candidate
      - name: Smoke the exact image that will publish
        run: scripts/toolchain_smoke.sh press-toolchain:candidate "$PWD"
      - name: Log in to GHCR (main only, after the smoke, never before)
        if: github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push the smoked per-arch image object (main only)
        if: github.event_name != 'pull_request'
        run: |
          # docker push of the same local image, never a second build: the
          # pushed layers are byte-for-byte the layers that passed the smoke.
          smoked_id=$(docker image inspect -f '{{.Id}}' press-toolchain:candidate)
          tag="ghcr.io/clintecker/press-toolchain:sha-${GITHUB_SHA}-${{ matrix.arch }}"
          docker tag press-toolchain:candidate "$tag"
          docker push "$tag"
          published_id=$(docker image inspect -f '{{.Id}}' "$tag")
          test "$smoked_id" = "$published_id" || { echo "published != smoked"; exit 1; }
          echo "smoked and published ${{ matrix.arch }}: $smoked_id"

  manifest:
    # Only after both architectures are smoked and pushed: assemble the
    # consumable tags as a manifest list over the two per-arch images.
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Assemble :latest and :sha-<SHA> from the two smoked images
        run: |
          repo=ghcr.io/clintecker/press-toolchain
          amd="$repo:sha-${GITHUB_SHA}-amd64"
          arm="$repo:sha-${GITHUB_SHA}-arm64"
          for tag in "latest" "sha-${GITHUB_SHA}"; do
            docker buildx imagetools create -t "$repo:$tag" "$amd" "$arm"
          done
          docker buildx imagetools inspect "$repo:sha-${GITHUB_SHA}"
