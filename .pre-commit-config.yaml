# The same three gates CI runs, before the commit exists. Install once:
#   pip install -e '.[dev]' && pre-commit install
repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff (lint + complexity gate)
        entry: ruff check src/press
        language: system
        pass_filenames: false
      - id: mypy
        name: mypy
        entry: python3 -m mypy src/press
        language: system
        pass_filenames: false
      - id: selftest
        name: press selftest (invariants + doc drift)
        entry: env PYTHONPATH=src python3 -m press selftest
        language: system
        pass_filenames: false
