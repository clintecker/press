# A field-and-hedge identity: dark bark-brown ink on aged paper with a single
# olive-green accent, the colour of a summer field going over. Like a
# commonplace book kept outdoors for decades.
register: "Reflective and unhurried; a writer who circles a question, admits what she does not know, and stays with it anyway."

web-palette:
  paper: "#f4f1e4"
  ink: "#232019"
  muted: "#65604f"
  accent: "#77802f"
  link: "#5f6a28"
  rule: "#d9d5c1"

web-palette-dark:
  paper: "#16150f"
  ink: "#e5e2d3"
  muted: "#9a9782"
  accent: "#a9b356"
  link: "#b3bd63"
  rule: "#2d2c1f"

book-colors:
  ink: "#232019"
  muted: "#65604f"
  accent: "#77802f"
  link: "#5f6a28"

typography:
  web-family: "'Crimson Pro', 'Iowan Old Style', 'Palatino Linotype', Georgia, serif"
  pdf-family: "Latin Modern Roman"
