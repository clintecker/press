# Small Hours: a warm, dim, lamplit identity. Values are prose where the
# art workflow reads them and tokens where the builders substitute them.

name: "Lamplight nocturne"

register: >-
  Hushed, nocturnal, spare. A small warm circle of lamplight in a dark
  room, everything softened, nothing hurried.

web-palette:
  ink: "#211c17"
  ink-soft: "#4a4038"
  paper: "#f6ecd8"
  paper-warm: "#efe1c6"
  accent: "#a8632c"

web-palette-dark:
  ink: "#e9ddc6"
  ink-soft: "#b6a789"
  paper: "#1a1712"
  paper-warm: "#221d16"
  accent: "#c8823f"

typography:
  web-family: '"Iowan Old Style", "Palatino Linotype", Palatino, "Book Antiqua", Georgia, serif'
  pdf-family: "EB Garamond"

book-colors:
  ink: "211C17"
  muted: "5C5148"
  accent: "A8632C"
  link: "8F4E22"
