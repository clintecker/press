from: markdown+smart+yaml_metadata_block+fenced_divs+footnotes
standalone: true
template: "@press/web/chunked-template.html"
toc: true
toc-depth: 2
number-sections: true
metadata-file: "@book/config/metadata.yaml"
filters:
  - "@press/lua/chapter-dropcap.lua"
split-level: 1
css:
  - reader.css
variables:
  homeurl: ../index.html
  toc-title: Contents
html-q-tags: true
