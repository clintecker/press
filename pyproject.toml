[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "press"
version = "1.2.0"
description = "Book production pipeline: pandoc/LuaLaTeX builds, editorial checks, and artifact verification"
requires-python = ">=3.10"
dependencies = [
    "PyYAML>=6.0",
    "Pillow>=10.0",
    "pypdf>=4.0",
]

[project.scripts]
press = "press.__main__:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
press = ["data/**/*"]
